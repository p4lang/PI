changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Bug Fixes
      labels:
        - bug
    - title: Enhancements
      labels:
        - enhancement
    - title: Build System
      labels:
        - autoconf
        - bazel
    - title: Dependencies
      labels:
        - dependencies
    - title: CI/Infrastructure
      labels:
        - github_actions
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"

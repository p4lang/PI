name: Monthly Release

on:
  workflow_dispatch:
  schedule:
    # Temporarily change day-of-month to 12 in order to test a change sooner than next month
    - cron: "17 12 12 * *" # At 12:17 on day-of-month 1 (avoid top-of-hour load)

permissions:
  contents: write
  pull-requests: write

jobs:
  monthly-release:
    if: ${{ github.repository == 'p4lang/PI' }}
    uses: p4lang/.github/.github/workflows/monthly-release.yml@main
    with:
      reviewers: fruffy, jafingerhut
